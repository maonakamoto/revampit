# Koyeb deployment config (FREE tier)
# Deploy: koyeb deploy --app revampit-medusa

name: revampit-medusa
type: web

build:
  dockerfile:
    dockerfile: Dockerfile.prod

env:
  - key: DATABASE_URL
    value: ""  # Set in Koyeb dashboard (Neon connection string)
  - key: REDIS_URL
    value: ""  # Set in Koyeb dashboard (Upstash connection string)
  - key: JWT_SECRET
    secret: jwt-secret
  - key: COOKIE_SECRET
    secret: cookie-secret
  - key: STORE_CORS
    value: "https://revampit.vercel.app"
  - key: ADMIN_CORS
    value: "https://revampit.vercel.app"
  - key: AUTH_CORS
    value: "https://revampit.vercel.app"

ports:
  - port: 9000
    protocol: http

health_checks:
  - port: 9000
    protocol: http
    path: /health

instance_types:
  - type: nano  # Free tier

regions:
  - fra  # Frankfurt (closest to Switzerland)

scaling:
  min: 1
  max: 1
