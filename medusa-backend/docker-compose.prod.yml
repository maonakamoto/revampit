version: '3.8'

# Self-hosted Medusa for production
# Deploy on your own server (free)

services:
  medusa:
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      # Use Neon PostgreSQL (free tier)
      DATABASE_URL: ${DATABASE_URL}

      # Local Redis (runs alongside)
      REDIS_URL: redis://redis:6379

      # Security - set these!
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}

      # CORS - your Vercel frontend
      STORE_CORS: https://revampit.vercel.app
      ADMIN_CORS: https://revampit.vercel.app
      AUTH_CORS: https://revampit.vercel.app

      MEDUSA_ADMIN_ONBOARDING_TYPE: default
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
