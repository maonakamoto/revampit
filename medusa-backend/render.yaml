# Render Blueprint - One-click deploy
# Click "New" > "Blueprint" in Render dashboard and connect this repo

services:
  - type: web
    name: revampit-medusa
    runtime: docker
    dockerfilePath: ./medusa-backend/Dockerfile.prod
    dockerContext: ./medusa-backend
    region: frankfurt
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false  # Set manually - use Neon connection string
      - key: REDIS_URL
        sync: false  # Set manually - use Upstash connection string
      - key: JWT_SECRET
        generateValue: true
      - key: COOKIE_SECRET
        generateValue: true
      - key: STORE_CORS
        value: https://revampit.vercel.app
      - key: ADMIN_CORS
        value: https://revampit.vercel.app
      - key: AUTH_CORS
        value: https://revampit.vercel.app
      - key: MEDUSA_ADMIN_ONBOARDING_TYPE
        value: default
