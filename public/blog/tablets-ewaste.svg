<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-label="Balkendiagramm globaler Elektroschrott: 34 Mt (2010), 62 Mt (2022, davon 22,3% recycelt), 82 Mt (2030, Prognose).">
  <style>
    text { font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    .axis { fill: #737373; font-size: 13px; }
    .unit { fill: #a3a3a3; font-size: 12px; letter-spacing: .04em; }
    .val { font-weight: 700; font-variant-numeric: tabular-nums; }
    .grid { stroke: #ececec; stroke-width: 1; }
  </style>
  <rect x="1" y="1" width="638" height="358" rx="16" fill="#ffffff" stroke="#e5e5e5"/>
  <text x="28" y="40" class="unit">MIO. TONNEN (Mt)</text>

  <!-- gridlines: 0,20,40,60,80 -->
  <g class="grid">
    <line x1="70" y1="290" x2="610" y2="290"/>
    <line x1="70" y1="239" x2="610" y2="239"/>
    <line x1="70" y1="188" x2="610" y2="188"/>
    <line x1="70" y1="137" x2="610" y2="137"/>
    <line x1="70" y1="86"  x2="610" y2="86"/>
  </g>
  <g class="axis" text-anchor="end">
    <text x="58" y="294">0</text>
    <text x="58" y="243">20</text>
    <text x="58" y="192">40</text>
    <text x="58" y="141">60</text>
    <text x="58" y="90">80</text>
  </g>

  <!-- 2010: 34 -->
  <rect x="115" y="203" width="90" height="87" rx="4" fill="#d4d4d4"/>
  <text x="160" y="193" text-anchor="middle" class="val" fill="#525252" font-size="17">34</text>
  <text x="160" y="313" text-anchor="middle" class="axis">2010</text>

  <!-- 2022: 62, recycled 22.3% (13.8) -->
  <rect x="295" y="132" width="90" height="158" rx="4" fill="#d4d4d4"/>
  <rect x="295" y="255" width="90" height="35" rx="4" fill="#15803d"/>
  <text x="340" y="122" text-anchor="middle" class="val" fill="#171717" font-size="18">62</text>
  <text x="340" y="313" text-anchor="middle" class="axis">2022</text>

  <!-- 2030 projection: 82 -->
  <rect x="475" y="80" width="90" height="210" rx="4" fill="none" stroke="#c2410c" stroke-width="2" stroke-dasharray="5 4"/>
  <text x="520" y="70" text-anchor="middle" class="val" fill="#c2410c" font-size="18">82</text>
  <text x="520" y="313" text-anchor="middle" class="axis">2030</text>

  <!-- recycled callout -->
  <line x1="385" y1="272" x2="452" y2="272" stroke="#15803d" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="342" y="276" text-anchor="middle" fill="#ffffff" font-size="11" class="val">22,3%</text>
</svg>
