<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 560" role="img" font-family="Inter, system-ui, sans-serif" aria-label="Der alte Erfassungs-Workflow: vier manuelle Schritte — wiegen, messen, fotografieren, Specs googeln — flossen in ein privates Spreadsheet, das Heinz zu einer Sammeltabelle zusammenführte, als CSV exportierte und an Cem gab, der es in Kivitendo hochlud; im Shop erschien nichts automatisch. 5 bis 15 Minuten reine Handarbeit pro Gerät.">
  <defs>
    <linearGradient id="bgAlt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef2f6"/>
    </linearGradient>
    <marker id="arrAlt" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1240" height="560" fill="url(#bgAlt)"/>

  <!-- four manual inputs -->
  <g font-size="17" fill="#334155">
    <g>
      <rect x="40" y="70" width="210" height="58" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="66" y="105">Gewicht wiegen</text>
    </g>
    <g>
      <rect x="40" y="150" width="210" height="58" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="66" y="185">Grösse messen</text>
    </g>
    <g>
      <rect x="40" y="230" width="210" height="58" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="66" y="265">Foto schiessen</text>
    </g>
    <g>
      <rect x="40" y="310" width="210" height="58" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
      <text x="66" y="345">Specs &amp; Preis googeln</text>
    </g>
  </g>

  <!-- converge into private spreadsheet -->
  <g stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arrAlt)">
    <path d="M250 99 C300 99 300 205 344 216"/>
    <path d="M250 179 C300 179 300 210 344 219"/>
    <path d="M250 259 C300 259 300 226 344 223"/>
    <path d="M250 339 C300 339 300 232 344 226"/>
  </g>

  <g font-size="16" fill="#1e293b">
    <rect x="350" y="182" width="184" height="82" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5"/>
    <text x="372" y="216" font-weight="600">Eigenes</text>
    <text x="372" y="240">Spreadsheet</text>
    <text x="372" y="256" font-size="13" fill="#64748b">(alles von Hand)</text>
  </g>

  <!-- the handoff chain -->
  <g stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arrAlt)">
    <path d="M534 223 L604 223"/>
    <path d="M788 223 L858 223"/>
  </g>

  <g font-size="16" fill="#1e293b">
    <rect x="610" y="182" width="178" height="82" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5"/>
    <text x="632" y="212" font-weight="600">Heinz</text>
    <text x="632" y="234" font-size="14">Sammel-Tabelle</text>
    <text x="632" y="254" font-size="13" fill="#64748b">→ CSV-Export</text>

    <rect x="864" y="182" width="178" height="82" rx="14" fill="#ffffff" stroke="#94a3b8" stroke-width="2.5"/>
    <text x="886" y="212" font-weight="600">Cem</text>
    <text x="886" y="234" font-size="14">Upload in</text>
    <text x="886" y="254" font-size="14">Kivitendo</text>
  </g>

  <!-- kivitendo book of record -->
  <g stroke="#94a3b8" stroke-width="2.5" fill="none" marker-end="url(#arrAlt)">
    <path d="M1042 223 L1082 223"/>
  </g>
  <g>
    <path d="M1088 208 v70 a56 15 0 0 0 112 0 v-70" fill="#334155"/>
    <ellipse cx="1144" cy="208" rx="56" ry="15" fill="#475569"/>
    <text x="1144" y="255" font-size="14" fill="#e2e8f0" text-anchor="middle" font-weight="600">Kivitendo</text>
    <text x="1144" y="300" font-size="12.5" fill="#64748b" text-anchor="middle">Perl-ERP · Buch</text>
  </g>

  <!-- the broken shop link -->
  <g>
    <path d="M1144 316 L1144 372" stroke="#dc2626" stroke-width="2.5" stroke-dasharray="6 6" fill="none"/>
    <text x="1128" y="352" font-size="22" fill="#dc2626" font-weight="700">✗</text>
    <rect x="994" y="382" width="240" height="60" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="2"/>
    <text x="1016" y="408" font-size="14.5" fill="#b91c1c" font-weight="600">Shop: erscheint NICHT</text>
    <text x="1016" y="428" font-size="14.5" fill="#b91c1c">automatisch → nochmals</text>
  </g>

  <!-- cost banner -->
  <g>
    <rect x="40" y="470" width="1160" height="58" rx="14" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
    <text x="72" y="506" font-size="19" fill="#9a3412" font-weight="700">5–15 Minuten pro Gerät · reine Handarbeit · über mehrere Personen verteilt</text>
    <text x="820" y="506" font-size="17" fill="#c2410c">— deshalb machten es nur wenige.</text>
  </g>
</svg>
