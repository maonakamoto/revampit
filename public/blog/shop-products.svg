<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Illustration: aufbereitete Geräte als Produktkarten im Marktplatz — der Laden beginnt beim Produkt.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="scr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c3a2a"/>
      <stop offset="1" stop-color="#14261b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="210" cy="140" r="120" fill="#bbf7d0" opacity="0.45"/>
  <circle cx="1010" cy="500" r="160" fill="#bbf7d0" opacity="0.4"/>
  <ellipse cx="600" cy="520" rx="300" ry="24" fill="#86efac" opacity="0.5"/>

  <!-- back card -->
  <g transform="rotate(-6 470 340)">
    <rect x="360" y="212" width="230" height="270" rx="20" fill="#ffffff" stroke="#a7f3c4" stroke-width="3"/>
    <rect x="384" y="236" width="182" height="120" rx="12" fill="url(#scr)"/>
    <rect x="384" y="378" width="120" height="12" rx="6" fill="#86efac"/>
    <rect x="384" y="402" width="80" height="12" rx="6" fill="#bbf7d0"/>
  </g>

  <!-- front card -->
  <g transform="rotate(5 730 350)">
    <rect x="620" y="222" width="240" height="278" rx="20" fill="#ffffff" stroke="#22c55e" stroke-width="3"/>
    <rect x="646" y="248" width="188" height="126" rx="12" fill="url(#scr)"/>
    <!-- circuit-leaf glyph on screen -->
    <g stroke="#22c55e" stroke-width="3" fill="none" stroke-linecap="round">
      <path d="M700 350 L700 300 L740 300"/>
      <circle cx="700" cy="350" r="4" fill="#22c55e" stroke="none"/>
    </g>
    <path d="M760 300 C760 276 780 262 800 276 C792 296 776 302 760 300 Z" fill="#22c55e"/>
    <rect x="646" y="398" width="140" height="13" rx="6.5" fill="#16a34a"/>
    <rect x="646" y="424" width="96" height="13" rx="6.5" fill="#bbf7d0"/>
  </g>

  <!-- price tag -->
  <g transform="rotate(12 880 250)">
    <path d="M812 210 h96 a14 14 0 0 1 14 14 v52 l-62 40 -62 -40 v-52 a14 14 0 0 1 14 -14 Z" fill="#c2410c"/>
    <circle cx="860" cy="234" r="10" fill="#ffffff"/>
    <rect x="828" y="256" width="64" height="9" rx="4.5" fill="#ffffff" opacity="0.9"/>
  </g>
</svg>
