<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Titelbild: Offen oder geschlossen — wie frei ist deine digitale Kommunikation?">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ecfdf5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="10" fill="#16a34a"/>

  <!-- ===== Left: title block ===== -->
  <text x="90" y="150" font-size="22" font-weight="700" letter-spacing="3" fill="#16a34a">DIGITALE SELBSTBESTIMMUNG</text>
  <text x="88" y="268" font-size="76" font-weight="800" fill="#1c1917">Offen oder</text>
  <text x="88" y="356" font-size="76" font-weight="800" fill="#1c1917">geschlossen<tspan fill="#16a34a">?</tspan></text>
  <rect x="92" y="386" width="120" height="6" rx="3" fill="#16a34a"/>
  <text x="90" y="446" font-size="34" font-weight="500" fill="#57534e">Wie frei ist deine digitale Kommunikation?</text>
  <text x="90" y="500" font-size="21" fill="#78716c">Soziale Medien &amp; Messenger — mit Zahlen und Quellen.</text>

  <!-- ===== Right: closed → open network motif ===== -->
  <!-- closed: one central node with a padlock -->
  <g stroke="#fdba74" stroke-width="2">
    <line x1="965" y1="180" x2="905" y2="140"/><line x1="965" y1="180" x2="1030" y2="140"/>
    <line x1="965" y1="180" x2="905" y2="225"/>
  </g>
  <g fill="#fed7aa"><circle cx="905" cy="140" r="10"/><circle cx="1030" cy="140" r="10"/><circle cx="905" cy="225" r="10"/></g>
  <circle cx="965" cy="180" r="30" fill="#ea580c"/>
  <!-- padlock on the closed node -->
  <g transform="translate(965,180)">
    <rect x="-12" y="-3" width="24" height="18" rx="3" fill="#ffffff"/>
    <path d="M -7 -3 v -5 a 7 7 0 0 1 14 0 v 5" fill="none" stroke="#ffffff" stroke-width="3.5"/>
  </g>
  <text x="965" y="252" text-anchor="middle" font-size="18" font-weight="700" fill="#c2410c">geschlossen</text>

  <!-- arrow -->
  <path d="M 1010 330 h 70" stroke="#a8a29e" stroke-width="3" fill="none"/>
  <polygon points="1080,324 1096,330 1080,336" fill="#a8a29e"/>

  <!-- open: green distributed mesh -->
  <g stroke="#16a34a" stroke-width="2.5">
    <line x1="900" y1="430" x2="1010" y2="410"/><line x1="1010" y1="410" x2="1110" y2="455"/>
    <line x1="1010" y1="410" x2="960" y2="510"/><line x1="1010" y1="410" x2="1085" y2="520"/>
    <line x1="900" y1="430" x2="960" y2="510"/><line x1="1110" y1="455" x2="1085" y2="520"/>
  </g>
  <g fill="#ffffff" stroke="#16a34a" stroke-width="4">
    <circle cx="900" cy="430" r="16"/><circle cx="1110" cy="455" r="16"/>
    <circle cx="960" cy="510" r="16"/><circle cx="1085" cy="520" r="16"/>
    <circle cx="1010" cy="410" r="18"/>
  </g>
  <text x="1005" y="575" text-anchor="middle" font-size="18" font-weight="700" fill="#15803d">offen · verteilt · verlassbar</text>
</svg>
