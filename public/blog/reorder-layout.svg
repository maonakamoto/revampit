<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Illustration: die Blöcke einer Seite werden neu angeordnet — Startseite und Marktplatz neu sortiert.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="210" cy="140" r="120" fill="#bbf7d0" opacity="0.45"/>
  <circle cx="1010" cy="500" r="160" fill="#bbf7d0" opacity="0.4"/>

  <!-- browser window -->
  <rect x="360" y="150" width="480" height="330" rx="22" fill="#ffffff" stroke="#a7f3c4" stroke-width="3"/>
  <rect x="360" y="150" width="480" height="52" rx="22" fill="#ecfdf5"/>
  <circle cx="392" cy="176" r="7" fill="#22c55e"/>
  <circle cx="416" cy="176" r="7" fill="#86efac"/>
  <circle cx="440" cy="176" r="7" fill="#bbf7d0"/>

  <!-- reordering blocks -->
  <rect x="392" y="230" width="416" height="70" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2.5"/>
  <rect x="392" y="316" width="200" height="120" rx="12" fill="#16a34a"/>
  <rect x="608" y="316" width="200" height="120" rx="12" fill="#bbf7d0" stroke="#22c55e" stroke-width="2.5"/>

  <!-- swap arrows (orange) between the two lower blocks -->
  <g stroke="#c2410c" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M566 360 l40 0 m-14 -14 l14 14 l-14 14"/>
    <path d="M634 392 l-40 0 m14 -14 l-14 14 l14 14"/>
  </g>
</svg>
