<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Illustration: ein föderierter Server wird auf eine neue Version gehoben, umgeben von verbundenen Netzwerk-Knoten.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="srv" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c3a2a"/>
      <stop offset="1" stop-color="#14261b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="210" cy="140" r="120" fill="#bbf7d0" opacity="0.45"/>
  <circle cx="1010" cy="500" r="160" fill="#bbf7d0" opacity="0.4"/>

  <!-- federation links -->
  <g stroke="#22c55e" stroke-width="3" opacity="0.55" fill="none">
    <path d="M600 300 L360 180"/><path d="M600 300 L860 170"/>
    <path d="M600 300 L330 430"/><path d="M600 300 L880 440"/>
  </g>
  <g fill="#16a34a">
    <circle cx="360" cy="180" r="18"/><circle cx="860" cy="170" r="18"/>
    <circle cx="330" cy="430" r="18"/><circle cx="880" cy="440" r="18"/>
  </g>

  <!-- central instance server -->
  <rect x="500" y="248" width="200" height="150" rx="20" fill="url(#srv)" stroke="#22c55e" stroke-width="3"/>
  <circle cx="536" cy="286" r="8" fill="#22c55e"/>
  <rect x="560" y="280" width="110" height="11" rx="5.5" fill="#86efac"/>
  <rect x="524" y="322" width="150" height="11" rx="5.5" fill="#4b6b58"/>
  <rect x="524" y="348" width="110" height="11" rx="5.5" fill="#4b6b58"/>

  <!-- upgrade arrow -->
  <path d="M600 232 l0 -78 m-30 30 l30 -34 l30 34" fill="none" stroke="#c2410c" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- version pip -->
  <circle cx="600" cy="118" r="10" fill="#c2410c"/>
</svg>
