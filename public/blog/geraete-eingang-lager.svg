<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 470" role="img" font-family="Inter, system-ui, sans-serif" aria-label="Die fehlende Mitte: die Erfassung registriert heute ein einzelnes Gerät mit Item-Nummer und einem freien Zeiger auf Standort und Box. Dazwischen fehlt die Lager- und Logistikverwaltung — echte Bestandsbewegungen, Kommissionierung, Mehrlager, Umlagerungen. Rechts steht Kivvi bereit mit Lagern, Beständen und einem Bewegungs-Ledger auf buchhalterischer Ebene. Die zu bauende Brücke.">
  <defs>
    <linearGradient id="bgL" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f6faf8"/><stop offset="1" stop-color="#eef4f1"/></linearGradient>
  </defs>
  <rect width="1240" height="470" fill="url(#bgL)"/>

  <!-- exists: device register -->
  <g>
    <rect x="48" y="150" width="290" height="170" rx="16" fill="#ffffff" stroke="#22c55e" stroke-width="2.5"/>
    <text x="193" y="186" font-size="17" fill="#14532d" font-weight="700" text-anchor="middle">Heute: Geräte-Register</text>
    <text x="72" y="222" font-size="13.5" fill="#166534">✓ ein Datensatz je Gerät (I-YYMMDD-NNNN)</text>
    <text x="72" y="248" font-size="13.5" fill="#166534">✓ Zeiger: storage_location_id · box_id</text>
    <text x="72" y="274" font-size="13.5" fill="#166534">✓ QC-Checkliste · Zustand</text>
    <text x="72" y="300" font-size="12.5" fill="#65a30d">„welches Regal hält dieses eine Gerät?“</text>
  </g>

  <!-- the gap -->
  <g>
    <rect x="392" y="120" width="356" height="230" rx="18" fill="#fff7ed" stroke="#f59e0b" stroke-width="3" stroke-dasharray="9 7"/>
    <text x="570" y="158" font-size="19" fill="#9a3412" font-weight="700" text-anchor="middle">Lager &amp; Logistik</text>
    <text x="570" y="182" font-size="15" fill="#c2410c" text-anchor="middle" font-weight="600">— die fehlende Mitte —</text>
    <g font-size="13.5" fill="#9a3412">
      <text x="418" y="220">✗ Bestandsbewegungen (Ein/Aus-Ledger)</text>
      <text x="418" y="248">✗ Kommissionierung · Pick/Pack</text>
      <text x="418" y="276">✗ Mehrlager · Umlagerungen</text>
      <text x="418" y="304">✗ Nachschub · Wareneingang</text>
    </g>
    <text x="570" y="336" font-size="12.5" fill="#b45309" text-anchor="middle">geplante Arbeit, um das Produkt fertigzustellen</text>
  </g>

  <!-- kivvi target -->
  <g>
    <rect x="902" y="150" width="290" height="170" rx="16" fill="#ffffff" stroke="#22c55e" stroke-width="2.5"/>
    <text x="1047" y="186" font-size="17" fill="#14532d" font-weight="700" text-anchor="middle">Kivvi: schon da</text>
    <text x="926" y="222" font-size="13.5" fill="#166534">• warehouses (Lager)</text>
    <text x="926" y="248" font-size="13.5" fill="#166534">• stockLevels (Bestand je Lager)</text>
    <text x="926" y="274" font-size="13.5" fill="#166534">• stockMovements (Bewegungs-Ledger)</text>
    <text x="926" y="300" font-size="12.5" fill="#65a30d">buchhalterische, nicht operative Granularität</text>
  </g>

  <!-- bridge arrows -->
  <path d="M338 235 L388 235" stroke="#94a3b8" stroke-width="2.6" fill="none"/>
  <path d="M748 235 L898 235" stroke="#94a3b8" stroke-width="2.6" fill="none"/>
  <text x="820" y="222" font-size="12.5" fill="#475569" text-anchor="middle">Brücke bauen</text>

  <!-- title strip -->
  <text x="620" y="60" font-size="22" fill="#166534" font-weight="700" text-anchor="middle">Der fehlende Baustein: Lager- und Logistikverwaltung</text>
  <text x="620" y="88" font-size="14.5" fill="#4d7c50" text-anchor="middle">Erfassung ist gelöst — das physische „wo liegt was, und wie bewegt es sich“ noch nicht.</text>
</svg>
