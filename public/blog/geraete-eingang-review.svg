<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 590" role="img" font-family="Inter, system-ui, sans-serif" aria-label="Der Prüf-Schritt im Geräte-Eingang: aus dem getippten Satz „Lenovo ThinkPad T480 i5 8GB 256GB SSD 320 CHF“ hat die KI ein sauberes Formular gefüllt — Hersteller Lenovo, Produktname ThinkPad T480, Kategorie Laptops, eine ausformulierte Kurzbeschreibung und Zustand Gut. Nur das Feld Zustand trägt einen kleinen orangen „Prüfen“-Hinweis, weil der Text den Zustand nie genannt hat; alle anderen Felder sind ruhig.">
  <rect width="1040" height="590" fill="#f6faf8"/>

  <!-- step ribbon -->
  <g font-size="14">
    <rect x="40" y="28" width="300" height="40" rx="9" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
    <circle cx="66" cy="48" r="11" fill="#16a34a"/><path d="M60 48 l4 5 l9 -10" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="86" y="53" fill="#166534">Daten eingeben</text>
    <rect x="356" y="28" width="300" height="40" rx="9" fill="#16a34a"/>
    <circle cx="382" cy="48" r="11" fill="#fff"/><text x="382" y="53" fill="#16a34a" text-anchor="middle" font-weight="700">2</text>
    <text x="402" y="53" fill="#fff" font-weight="600">KI-Daten prüfen</text>
    <rect x="672" y="28" width="300" height="40" rx="9" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <circle cx="698" cy="48" r="11" fill="#e2e8f0"/><text x="698" y="53" fill="#64748b" text-anchor="middle" font-weight="700">3</text>
    <text x="718" y="53" fill="#64748b">Nächsten Schritt wählen</text>
  </g>

  <!-- the input echo -->
  <g font-size="13.5">
    <rect x="40" y="88" width="960" height="40" rx="9" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="60" y="113" fill="#94a3b8">Eingabe:</text>
    <text x="122" y="113" fill="#334155" font-family="ui-monospace, monospace">Lenovo ThinkPad T480 Intel Core i5 8GB RAM 256GB SSD 320 CHF</text>
  </g>

  <!-- card -->
  <rect x="40" y="150" width="960" height="410" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="72" y="192" font-size="18" fill="#111827" font-weight="700">Grundinformationen</text>

  <!-- Hersteller -->
  <g font-size="13.5">
    <text x="72" y="230" fill="#475569">Hersteller *</text>
    <rect x="72" y="242" width="420" height="44" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="90" y="270" fill="#111827" font-size="15">Lenovo</text>
  </g>
  <!-- Zustand + Prüfen chip -->
  <g font-size="13.5">
    <text x="548" y="230" fill="#475569">Zustand *</text>
    <g><rect x="614" y="216" width="70" height="24" rx="6" fill="#ffedd5" stroke="#fdba74" stroke-width="1.3"/>
      <path d="M626 228 l3 -6 l0 12 z" fill="#c2410c"/><circle cx="626" cy="228" r="3.5" fill="#ea580c"/>
      <text x="638" y="233" fill="#9a3412" font-weight="600" font-size="12.5">Prüfen</text></g>
    <rect x="548" y="242" width="380" height="44" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="566" y="270" fill="#111827" font-size="15">Gut</text>
    <path d="M902 260 l8 8 l8 -8" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Produktname -->
  <g font-size="13.5">
    <text x="72" y="316" fill="#475569">Produktname / Modell *</text>
    <rect x="72" y="328" width="856" height="44" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="90" y="356" fill="#111827" font-size="15">ThinkPad T480</text>
  </g>
  <!-- Kurzbeschreibung -->
  <g font-size="13.5">
    <text x="72" y="400" fill="#475569">Kurzbeschreibung</text>
    <rect x="72" y="412" width="856" height="52" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="90" y="443" fill="#111827" font-size="14.5">Ein Lenovo ThinkPad T480 Laptop mit Intel Core i5 Prozessor, ideal für Büroanwendungen</text>
  </g>
  <!-- Kategorie -->
  <g font-size="13.5">
    <text x="72" y="494" fill="#475569">Kategorie</text>
    <rect x="72" y="506" width="420" height="44" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect x="90" y="521" width="15" height="12" rx="2" fill="#166534"/>
    <text x="116" y="534" fill="#111827" font-size="15">Laptops</text>
    <path d="M462 524 l8 8 l8 -8" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
    <text x="548" y="494" fill="#475569">Unterkategorie</text>
    <rect x="548" y="506" width="380" height="44" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="566" y="534" fill="#94a3b8" font-size="15">Wählen…</text>
    <path d="M902 524 l8 8 l8 -8" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
