<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" font-family="Inter, system-ui, sans-serif" aria-label="Ein einzelnes Foto eines Laptops verwandelt sich über einen KI-Funken in einen sauberen, strukturierten Datensatz mit grünem Häkchen, der zugleich ins Lager, in die Datenbank und in den Shop fliesst.">
  <defs>
    <linearGradient id="bgH" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f0fdf4"/><stop offset="1" stop-color="#dcfce7"/></linearGradient>
    <linearGradient id="dbH" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#1c3a2a"/><stop offset="1" stop-color="#14261b"/></linearGradient>
    <marker id="arrH" markerWidth="10" markerHeight="10" refX="7.5" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="#22c55e"/></marker>
  </defs>
  <rect width="1200" height="630" fill="url(#bgH)"/>
  <circle cx="180" cy="120" r="130" fill="#bbf7d0" opacity="0.4"/>
  <circle cx="1030" cy="520" r="170" fill="#bbf7d0" opacity="0.4"/>

  <!-- phone capturing a device -->
  <g>
    <rect x="120" y="200" width="150" height="240" rx="22" fill="#14532d"/>
    <rect x="136" y="222" width="118" height="182" rx="8" fill="#dcfce7"/>
    <!-- laptop silhouette on screen -->
    <path d="M158 350 h74 l10 22 h-94 z" fill="#16a34a"/>
    <rect x="166" y="300" width="58" height="42" rx="4" fill="#16a34a"/>
    <rect x="172" y="306" width="46" height="30" rx="2" fill="#86efac"/>
    <circle cx="195" cy="418" r="9" fill="#4ade80"/>
  </g>

  <!-- AI spark -->
  <g transform="translate(420 300)">
    <g fill="#16a34a">
      <path d="M0 -46 L11 -13 L44 0 L11 13 L0 46 L-11 13 L-44 0 L-11 -13 Z"/>
    </g>
    <g fill="#4ade80">
      <path d="M56 -34 L62 -20 L76 -14 L62 -8 L56 6 L50 -8 L36 -14 L50 -20 Z" opacity="0.9"/>
    </g>
  </g>

  <!-- flows -->
  <g stroke="#22c55e" stroke-width="4" fill="none" stroke-linecap="round" marker-end="url(#arrH)">
    <path d="M270 320 C330 320 340 300 370 300"/>
    <path d="M470 300 C560 300 560 190 640 178"/>
    <path d="M470 300 L640 300"/>
    <path d="M470 300 C560 300 560 420 640 432"/>
  </g>

  <!-- structured record card (center-right) -->
  <g>
    <rect x="646" y="250" width="220" height="128" rx="16" fill="#ffffff" stroke="#22c55e" stroke-width="3"/>
    <rect x="670" y="276" width="120" height="12" rx="6" fill="#166534"/>
    <rect x="670" y="300" width="160" height="9" rx="4.5" fill="#86efac"/>
    <rect x="670" y="318" width="140" height="9" rx="4.5" fill="#86efac"/>
    <rect x="670" y="336" width="100" height="9" rx="4.5" fill="#bbf7d0"/>
    <circle cx="838" cy="286" r="20" fill="#16a34a"/>
    <path d="M828 286 l7 8 l14 -17" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- three destinations: shelf, db, shop -->
  <!-- shelf -->
  <g transform="translate(950 130)">
    <rect x="0" y="0" width="120" height="96" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="3"/>
    <line x1="0" y1="48" x2="120" y2="48" stroke="#22c55e" stroke-width="3"/>
    <rect x="14" y="14" width="26" height="26" rx="3" fill="#86efac"/>
    <rect x="50" y="14" width="26" height="26" rx="3" fill="#4ade80"/>
    <rect x="14" y="60" width="26" height="26" rx="3" fill="#4ade80"/>
    <rect x="50" y="60" width="26" height="26" rx="3" fill="#86efac"/>
  </g>
  <!-- database -->
  <g transform="translate(958 262)">
    <path d="M0 12 v54 a52 13 0 0 0 104 0 v-54" fill="url(#dbH)"/>
    <ellipse cx="52" cy="12" rx="52" ry="13" fill="#22543d"/>
    <ellipse cx="52" cy="12" rx="52" ry="13" fill="none" stroke="#22c55e" stroke-width="3"/>
  </g>
  <!-- shop tag -->
  <g transform="translate(950 404)">
    <path d="M8 4 h74 a12 12 0 0 1 12 12 v40 a12 12 0 0 1 -12 12 h-74 l-24 -32 z" fill="#16a34a"/>
    <circle cx="20" cy="36" r="7" fill="#dcfce7"/>
  </g>
</svg>
