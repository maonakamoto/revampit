<svg xmlns="http://www.w3.org/2000/svg" width="820" height="380" viewBox="0 0 820 380" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Metapher: Verschlüsselung schützt den Brief (Inhalt), nicht den Umschlag (Metadaten)">
  <rect x="0" y="0" width="820" height="380" rx="16" fill="#ffffff" stroke="#e7e5e4"/>
  <text x="410" y="44" text-anchor="middle" font-size="19" font-weight="700" fill="#1c1917">Verschlüsselung schützt den Brief — nicht den Umschlag</text>

  <!-- ===== Left: the letter (content) = sealed ===== -->
  <text x="230" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">Inhalt = der Brief</text>
  <rect x="120" y="100" width="220" height="180" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <line x1="145" y1="140" x2="315" y2="140" stroke="#bbf7d0" stroke-width="6"/>
  <line x1="145" y1="165" x2="315" y2="165" stroke="#bbf7d0" stroke-width="6"/>
  <line x1="145" y1="190" x2="270" y2="190" stroke="#bbf7d0" stroke-width="6"/>
  <!-- big lock -->
  <g transform="translate(230,232)">
    <rect x="-22" y="-6" width="44" height="34" rx="5" fill="#16a34a"/>
    <path d="M -13 -6 v -9 a 13 13 0 0 1 26 0 v 9" fill="none" stroke="#16a34a" stroke-width="6"/>
    <circle cx="0" cy="9" r="4" fill="#fff"/>
  </g>
  <text x="230" y="300" text-anchor="middle" font-size="12.5" fill="#15803d" font-weight="600">E2E: nur ihr beide könnt ihn lesen</text>

  <!-- ===== Right: the envelope (metadata) = visible ===== -->
  <text x="580" y="86" text-anchor="middle" font-size="14" font-weight="700" fill="#c2410c">Umschlag = die Metadaten</text>
  <!-- envelope body -->
  <rect x="450" y="100" width="260" height="170" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <!-- envelope flap -->
  <path d="M 450 108 L 580 190 L 710 108" fill="none" stroke="#fdba74" stroke-width="2"/>
  <!-- visible metadata lines -->
  <text x="470" y="150" font-size="13" fill="#9a3412">Von:  Du</text>
  <text x="470" y="176" font-size="13" fill="#9a3412">An:   +41 79 …</text>
  <text x="470" y="202" font-size="13" fill="#9a3412">Zeit: 02:14 Uhr</text>
  <text x="470" y="228" font-size="13" fill="#9a3412">Ort:  Zürich</text>
  <!-- open eye -->
  <g transform="translate(650,195)">
    <path d="M -26 0 Q 0 -20 26 0 Q 0 20 -26 0 Z" fill="#ffffff" stroke="#ea580c" stroke-width="2"/>
    <circle cx="0" cy="0" r="7" fill="#ea580c"/>
  </g>
  <text x="580" y="300" text-anchor="middle" font-size="12.5" fill="#c2410c" font-weight="600">sichtbar: wer, an wen, wann, von wo</text>

  <text x="410" y="344" text-anchor="middle" font-size="13" fill="#57534e">Nachrichtendienste interessieren sich für den Umschlag oft mehr als für den Brief.</text>
</svg>
