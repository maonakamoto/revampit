<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Privatsphäre-Spektrum der Messenger von Telegram bis SimpleX">
  <rect x="0" y="0" width="900" height="340" rx="16" fill="#ffffff" stroke="#e7e5e4"/>
  <text x="450" y="42" text-anchor="middle" font-size="19" font-weight="700" fill="#1c1917">Wie viel Privatsphäre? Ein Spektrum</text>

  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ea580c"/>
      <stop offset="0.5" stop-color="#eab308"/>
      <stop offset="1" stop-color="#16a34a"/>
    </linearGradient>
  </defs>

  <!-- spectrum bar -->
  <rect x="70" y="176" width="740" height="10" rx="5" fill="url(#grad)"/>
  <polygon points="810,171 834,181 810,191" fill="#16a34a"/>
  <text x="70" y="215" font-size="12" fill="#9a3412">weniger privat</text>
  <text x="810" y="215" text-anchor="end" font-size="12" fill="#15803d">mehr privat</text>

  <!-- markers -->
  <!-- 1 Telegram -->
  <circle cx="120" cy="181" r="8" fill="#ea580c"/>
  <text x="120" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">Telegram</text>
  <text x="120" y="138" text-anchor="middle" font-size="11" fill="#78716c">nur Transport —</text>
  <text x="120" y="152" text-anchor="middle" font-size="11" fill="#78716c">Server liest mit</text>

  <!-- 2 WhatsApp/iMessage -->
  <circle cx="300" cy="181" r="8" fill="#eab308"/>
  <text x="300" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#a16207">WhatsApp · iMessage</text>
  <text x="300" y="270" text-anchor="middle" font-size="11" fill="#78716c">E2E-Inhalt, aber viele</text>
  <text x="300" y="284" text-anchor="middle" font-size="11" fill="#78716c">Metadaten / geschlossen</text>

  <!-- 3 Signal -->
  <circle cx="500" cy="181" r="8" fill="#65a30d"/>
  <text x="500" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#4d7c0f">Signal</text>
  <text x="500" y="138" text-anchor="middle" font-size="11" fill="#78716c">E2E + wenig Metadaten</text>
  <text x="500" y="152" text-anchor="middle" font-size="11" fill="#78716c">(Sealed Sender)</text>

  <!-- 4 Threema -->
  <circle cx="660" cy="181" r="8" fill="#16a34a"/>
  <text x="660" y="250" text-anchor="middle" font-size="14" font-weight="700" fill="#15803d">Threema 🇨🇭</text>
  <text x="660" y="270" text-anchor="middle" font-size="11" fill="#78716c">+ keine Telefonnummer,</text>
  <text x="660" y="284" text-anchor="middle" font-size="11" fill="#78716c">Server in der Schweiz</text>

  <!-- 5 SimpleX -->
  <circle cx="790" cy="181" r="9" fill="#166534"/>
  <text x="790" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#166534">SimpleX</text>
  <text x="790" y="138" text-anchor="middle" font-size="11" fill="#78716c">+ gar keine</text>
  <text x="790" y="152" text-anchor="middle" font-size="11" fill="#78716c">Nutzer-Kennung</text>

  <text x="450" y="322" text-anchor="middle" font-size="12" fill="#57534e">Weiter rechts = weniger Spuren. Der Preis: meist kleiner und unbequemer.</text>
</svg>
