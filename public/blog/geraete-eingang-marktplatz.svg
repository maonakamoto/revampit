    <rect x="284" y="316" width="228" height="104" rx="12" fill="#eef2f0"/><rect x="284" y="380" width="228" height="40" fill="#eef2f0"/>
    <rect x="300" y="432" width="150" height="11" rx="5.5" fill="#334155"/><text x="300" y="474" font-size="16" fill="#15803d" font-weight="700">CHF 25</text>

    <rect x="528" y="316" width="228" height="180" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <rect x="528" y="316" width="228" height="104" rx="12" fill="#eef2f0"/><rect x="528" y="380" width="228" height="40" fill="#eef2f0"/>
    <rect x="544" y="432" width="130" height="11" rx="5.5" fill="#334155"/><text x="544" y="474" font-size="16" fill="#15803d" font-weight="700">CHF 40</text>

    <rect x="772" y="316" width="228" height="180" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <rect x="772" y="316" width="228" height="104" rx="12" fill="#eef2f0"/><rect x="772" y="380" width="228" height="40" fill="#eef2f0"/>
    <rect x="788" y="432" width="160" height="11" rx="5.5" fill="#334155"/><text x="788" y="474" font-size="16" fill="#15803d" font-weight="700">CHF 15</text>
  </g>
  <text x="520" y="530" font-size="13.5" fill="#94a3b8" text-anchor="middle">… + 200 weitere, alle mit Bild, aus dem alten Shop migriert</text>
</svg>
