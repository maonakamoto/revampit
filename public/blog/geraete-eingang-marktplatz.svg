<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 560" role="img" font-family="Inter, system-ui, sans-serif" aria-label="Der Marktplatz nach der Migration: statt elf Inseraten stehen jetzt 208 aktive Angebote — jede Karte mit Produktbild, Titel, Preis und Zustands-Badge, gespeist aus dem alten Shopware-Katalog. Beispiele: Lenovo ThinkPad T450 für 300 Franken, HP LaserJet P3005dn für 65 Franken, Dell 19-Zoll-Monitor für 35 Franken, Apple iMac G5 für 110 Franken.">
  <rect width="1040" height="560" fill="#f6faf8"/>

  <!-- header -->
  <text x="40" y="52" font-size="22" fill="#111827" font-weight="700">Marktplatz</text>
  <g>
    <rect x="196" y="32" width="150" height="30" rx="15" fill="#dcfce7" stroke="#4ade80" stroke-width="1.5"/>
    <text x="271" y="52" font-size="14" fill="#166534" text-anchor="middle" font-weight="700">208 Inserate</text>
  </g>
  <text x="360" y="52" font-size="13.5" fill="#94a3b8">(vorher: 11)</text>

  <!-- grid of product cards -->
  <!-- card template: image + title + price + badge -->
  <g>
    <!-- row 1 -->
    <!-- card 1 -->
    <g><rect x="40" y="86" width="228" height="210" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <rect x="40" y="86" width="228" height="118" rx="12" fill="#eef2f0"/><rect x="40" y="150" width="228" height="54" fill="#eef2f0"/>
      <rect x="86" y="118" width="80" height="50" rx="4" fill="#cbd5e1"/><rect x="92" y="124" width="68" height="34" rx="2" fill="#94a3b8"/><path d="M78 178 h112 l14 14 h-140 z" fill="#cbd5e1"/>
      <rect x="56" y="216" width="150" height="12" rx="6" fill="#334155"/>
      <text x="56" y="262" font-size="17" fill="#15803d" font-weight="700">CHF 300</text>
      <rect x="176" y="248" width="76" height="22" rx="6" fill="#dcfce7"/><text x="214" y="263" font-size="11.5" fill="#166534" text-anchor="middle" font-weight="600">GUT</text>
    </g>
    <!-- card 2 -->
    <g><rect x="284" y="86" width="228" height="210" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <rect x="284" y="86" width="228" height="118" rx="12" fill="#eef2f0"/><rect x="284" y="150" width="228" height="54" fill="#eef2f0"/>
      <rect x="336" y="120" width="124" height="64" rx="6" fill="#cbd5e1"/><rect x="352" y="132" width="30" height="40" rx="3" fill="#94a3b8"/><rect x="392" y="140" width="52" height="10" rx="3" fill="#94a3b8"/>
      <rect x="300" y="216" width="170" height="12" rx="6" fill="#334155"/>
      <text x="300" y="262" font-size="17" fill="#15803d" font-weight="700">CHF 65</text>
      <rect x="420" y="248" width="76" height="22" rx="6" fill="#dcfce7"/><text x="458" y="263" font-size="11.5" fill="#166534" text-anchor="middle" font-weight="600">GUT</text>
    </g>
    <!-- card 3 -->
    <g><rect x="528" y="86" width="228" height="210" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <rect x="528" y="86" width="228" height="118" rx="12" fill="#eef2f0"/><rect x="528" y="150" width="228" height="54" fill="#eef2f0"/>
      <rect x="586" y="112" width="112" height="72" rx="4" fill="#cbd5e1"/><rect x="594" y="120" width="96" height="50" rx="2" fill="#94a3b8"/><rect x="628" y="184" width="28" height="6" fill="#cbd5e1"/>
      <rect x="544" y="216" width="188" height="12" rx="6" fill="#334155"/>
      <text x="544" y="262" font-size="17" fill="#15803d" font-weight="700">CHF 35</text>
      <rect x="664" y="248" width="76" height="22" rx="6" fill="#dcfce7"/><text x="702" y="263" font-size="11.5" fill="#166534" text-anchor="middle" font-weight="600">GUT</text>
    </g>
    <!-- card 4 -->
    <g><rect x="772" y="86" width="228" height="210" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
      <rect x="772" y="86" width="228" height="118" rx="12" fill="#eef2f0"/><rect x="772" y="150" width="228" height="54" fill="#eef2f0"/>
      <rect x="838" y="112" width="96" height="76" rx="8" fill="#cbd5e1"/><rect x="850" y="122" width="72" height="46" rx="2" fill="#94a3b8"/><rect x="874" y="176" width="24" height="8" rx="2" fill="#cbd5e1"/>
