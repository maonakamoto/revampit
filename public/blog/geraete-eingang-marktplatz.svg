  <!-- row 2 (faded, implies more) -->
  <g opacity="0.55">
    <rect x="40" y="316" width="228" height="180" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <rect x="40" y="316" width="228" height="104" rx="12" fill="#eef2f0"/><rect x="40" y="380" width="228" height="40" fill="#eef2f0"/>
    <rect x="56" y="432" width="140" height="11" rx="5.5" fill="#334155"/><text x="56" y="474" font-size="16" fill="#15803d" font-weight="700">CHF 90</text>

