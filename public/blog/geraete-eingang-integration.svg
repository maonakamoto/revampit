<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 600" role="img" font-family="Inter, system-ui, sans-serif" aria-label="Integrations-Architektur: der RevampIT-Geräte-Eingang schreibt lokal inventory_items und synchronisiert nach oben zu Kivvi über dessen fertige REST-API POST /api/v1/inventory-items mit Bearer-Token und Idempotency-Key, und erhält Status-Webhooks zurück. Zum Perl-Legacy Kivitendo, das keine API hat, führt der Weg über eine separate Node-Übersetzungsschicht, die einen Browser nachahmt: laden, mergen, als flaches Formular an controller.pl posten. Kivvi ist eine saubere Membran, Kivitendo braucht einen Übersetzer.">
  <defs>
    <linearGradient id="bgI" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f7fbf9"/><stop offset="1" stop-color="#eef4f1"/></linearGradient>
    <marker id="arrG" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#16a34a"/></marker>
    <marker id="arrS" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#64748b"/></marker>
    <marker id="arrGback" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="#0d9488"/></marker>
  </defs>
  <rect width="1240" height="600" fill="url(#bgI)"/>

  <!-- RevampIT intake (left, center) -->
  <g>
    <rect x="48" y="216" width="272" height="168" rx="18" fill="#15803d"/>
    <text x="184" y="256" font-size="20" fill="#ffffff" font-weight="700" text-anchor="middle">RevampIT</text>
    <text x="184" y="282" font-size="14.5" fill="#dcfce7" text-anchor="middle">Geräte-Eingang</text>
    <rect x="76" y="300" width="216" height="66" rx="10" fill="#166534"/>
    <text x="184" y="326" font-size="13.5" fill="#bbf7d0" text-anchor="middle">createErfassungProduct()</text>
    <text x="184" y="348" font-size="13.5" fill="#bbf7d0" text-anchor="middle">→ inventory_items</text>
  </g>

  <!-- ===== Kivvi (top right): modern, clean REST ===== -->
  <g>
    <rect x="880" y="70" width="312" height="150" rx="18" fill="#ffffff" stroke="#22c55e" stroke-width="3"/>
    <text x="1036" y="108" font-size="19" fill="#14532d" font-weight="700" text-anchor="middle">Kivvi</text>
    <text x="1036" y="132" font-size="13.5" fill="#166534" text-anchor="middle">moderne Cloud-ERP · Drizzle/Postgres</text>
    <rect x="908" y="146" width="256" height="56" rx="10" fill="#f0fdf4" stroke="#86efac" stroke-width="2"/>
    <text x="1036" y="170" font-size="13" fill="#15803d" text-anchor="middle">REST /api/v1 · inventory_items</text>
    <text x="1036" y="190" font-size="12.5" fill="#65a30d" text-anchor="middle">warehouses · stock · webhooks</text>
  </g>
  <!-- push up to Kivvi -->
  <path d="M320 250 C560 230 640 150 874 138" stroke="#16a34a" stroke-width="3" fill="none" marker-end="url(#arrG)"/>
  <g font-size="13.5" fill="#166534" text-anchor="middle">
    <rect x="470" y="150" width="330" height="30" rx="8" fill="#ffffff" stroke="#bbf7d0" stroke-width="1.5"/>
    <text x="635" y="170" font-weight="600">POST · Bearer kv_… · Idempotency-Key</text>
  </g>
  <!-- webhook back -->
  <path d="M876 190 C640 250 560 300 322 300" stroke="#0d9488" stroke-width="2.6" stroke-dasharray="6 5" fill="none" marker-end="url(#arrGback)"/>
  <text x="600" y="292" font-size="13" fill="#0f766e" text-anchor="middle">Webhook zurück: inventory_item.status_changed (verkauft)</text>

  <!-- ===== Kivitendo (bottom right): legacy, needs translator ===== -->
  <!-- translator membrane -->
  <g>
    <rect x="470" y="410" width="298" height="150" rx="16" fill="#ecfeff" stroke="#0d9488" stroke-width="2.5" stroke-dasharray="2 0"/>
    <text x="619" y="442" font-size="16" fill="#0f766e" font-weight="700" text-anchor="middle">API-Schicht (Node)</text>
    <text x="619" y="464" font-size="12.5" fill="#0d9488" text-anchor="middle">ahmt einen Browser nach</text>
    <text x="619" y="492" font-size="12.5" fill="#134e4a" text-anchor="middle">laden (SELECT) → mergen →</text>
    <text x="619" y="510" font-size="12.5" fill="#134e4a" text-anchor="middle">$::form als flacher POST</text>
    <text x="619" y="536" font-size="11.5" fill="#0d9488" text-anchor="middle">Mappings per KI generiert · experimentell</text>
  </g>
  <!-- kivitendo box -->
  <g>
    <rect x="880" y="418" width="312" height="134" rx="16" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2.5"/>
    <text x="1036" y="452" font-size="19" fill="#334155" font-weight="700" text-anchor="middle">Kivitendo</text>
    <text x="1036" y="476" font-size="13" fill="#475569" text-anchor="middle">Perl-MVC · Buch der Wahrheit</text>
    <rect x="908" y="490" width="256" height="46" rx="9" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
    <text x="1036" y="512" font-size="12.5" fill="#64748b" text-anchor="middle">kein API · HTML-Formulare</text>
    <text x="1036" y="528" font-size="12" fill="#dc2626" text-anchor="middle">controller.pl?action=Part/save</text>
  </g>
  <!-- revampit -> translator -->
  <path d="M320 350 C400 380 420 430 464 448" stroke="#64748b" stroke-width="2.6" fill="none" marker-end="url(#arrS)"/>
  <text x="372" y="418" font-size="12.5" fill="#475569">geplant</text>
  <!-- translator -> kivitendo -->
  <path d="M768 485 L874 485" stroke="#64748b" stroke-width="2.6" fill="none" marker-end="url(#arrS)"/>

  <!-- captions -->
  <text x="1036" y="245" font-size="13" fill="#15803d" text-anchor="middle" font-weight="600">saubere Membran — schon da</text>
  <text x="619" y="392" font-size="13" fill="#0f766e" text-anchor="middle" font-weight="600">ein Übersetzer, kein zweites Gehirn</text>
</svg>
