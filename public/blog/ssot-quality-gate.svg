<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Illustration: mehrere Datenquellen laufen durch ein Qualitätstor zu einer einzigen Quelle der Wahrheit zusammen.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="db" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c3a2a"/>
      <stop offset="1" stop-color="#14261b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="210" cy="140" r="120" fill="#bbf7d0" opacity="0.45"/>
  <circle cx="1010" cy="500" r="160" fill="#bbf7d0" opacity="0.4"/>

  <!-- scattered sources on the left -->
  <g fill="#ffffff" stroke="#a7f3c4" stroke-width="3">
    <rect x="196" y="176" width="96" height="70" rx="12"/>
    <rect x="176" y="288" width="96" height="70" rx="12"/>
    <rect x="196" y="400" width="96" height="70" rx="12"/>
  </g>
  <g fill="#86efac">
    <rect x="214" y="198" width="60" height="9" rx="4.5"/>
    <rect x="214" y="216" width="42" height="9" rx="4.5"/>
    <rect x="194" y="310" width="60" height="9" rx="4.5"/>
    <rect x="194" y="328" width="42" height="9" rx="4.5"/>
    <rect x="214" y="422" width="60" height="9" rx="4.5"/>
    <rect x="214" y="440" width="42" height="9" rx="4.5"/>
  </g>

  <!-- converging traces through the gate -->
  <g stroke="#22c55e" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M292 211 C400 211 430 300 512 315"/>
    <path d="M272 323 L512 315"/>
    <path d="M292 435 C400 435 430 330 512 315"/>
  </g>

  <!-- the quality gate -->
  <rect x="470" y="150" width="14" height="330" rx="7" fill="#15803d"/>
  <rect x="470" y="150" width="14" height="70" rx="7" fill="#c2410c"/>

  <!-- single source of truth: a database cylinder -->
  <g>
    <path d="M560 300 v92 a100 26 0 0 0 200 0 v-92" fill="url(#db)"/>
    <ellipse cx="660" cy="300" rx="100" ry="26" fill="#22543d"/>
    <ellipse cx="660" cy="300" rx="100" ry="26" fill="none" stroke="#22c55e" stroke-width="3"/>
    <path d="M560 346 a100 26 0 0 0 200 0" fill="none" stroke="#22c55e" stroke-width="2.5" opacity="0.6"/>
  </g>

  <!-- verified check badge -->
  <circle cx="756" cy="256" r="34" fill="#16a34a"/>
  <path d="M740 256 l11 12 l22 -26" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
