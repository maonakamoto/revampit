<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Illustration: ein Weg führt über mehrere Stationen von aussen zu einem Team; unterwegs sammeln sich Fähigkeiten an.">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0fdf4"/>
      <stop offset="1" stop-color="#dcfce7"/>
    </linearGradient>
    <linearGradient id="team" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c3a2a"/>
      <stop offset="1" stop-color="#14261b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="180" cy="140" r="120" fill="#bbf7d0" opacity="0.45"/>
  <circle cx="1030" cy="500" r="170" fill="#bbf7d0" opacity="0.4"/>

  <!-- the path from outside to the team -->
  <path d="M150 470 C 360 470 380 300 560 300 C 720 300 760 200 940 200"
        fill="none" stroke="#22c55e" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 22"/>

  <!-- start: a single person, apart -->
  <g>
    <circle cx="150" cy="440" r="26" fill="#ffffff" stroke="#86efac" stroke-width="4"/>
    <path d="M116 490 a34 30 0 0 1 68 0 z" fill="#ffffff" stroke="#86efac" stroke-width="4"/>
  </g>

  <!-- milestones along the way: skills picked up -->
  <g fill="#ffffff" stroke="#22c55e" stroke-width="3">
    <rect x="330" y="392" width="56" height="56" rx="14"/>
    <rect x="532" y="272" width="56" height="56" rx="14"/>
    <rect x="734" y="242" width="56" height="56" rx="14"/>
  </g>
  <g stroke="#16a34a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M346 420 l8 9 l16 -19"/>
    <path d="M548 300 l8 9 l16 -19"/>
    <path d="M750 270 l8 9 l16 -19"/>
  </g>

  <!-- destination: the team -->
  <g>
    <circle cx="940" cy="180" r="88" fill="url(#team)"/>
    <circle cx="940" cy="180" r="88" fill="none" stroke="#22c55e" stroke-width="3"/>
    <!-- three figures inside the team -->
    <g fill="#86efac">
      <circle cx="910" cy="160" r="16"/>
      <path d="M888 205 a22 20 0 0 1 44 0 z"/>
      <circle cx="970" cy="160" r="16"/>
      <path d="M948 205 a22 20 0 0 1 44 0 z"/>
      <circle cx="940" cy="130" r="16"/>
    </g>
    <path d="M918 130 a22 20 0 0 1 44 0 z" fill="#22c55e"/>
  </g>

  <!-- welcome badge on the team -->
  <circle cx="1010" cy="118" r="30" fill="#16a34a"/>
  <path d="M995 118 l10 11 l20 -24" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
