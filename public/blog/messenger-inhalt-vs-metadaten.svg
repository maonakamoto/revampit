<svg xmlns="http://www.w3.org/2000/svg" width="820" height="540" viewBox="0 0 820 540" font-family="Inter, system-ui, sans-serif" role="img" aria-label="Zwei-Achsen-Vergleich der Messenger: Schutz des Inhalts gegen Schutz der Metadaten. WhatsApp schützt den Inhalt, aber nicht die Metadaten; Telegram umgekehrt.">
  <rect x="0" y="0" width="820" height="540" rx="16" fill="#ffffff" stroke="#e7e5e4"/>
  <text x="410" y="40" text-anchor="middle" font-size="19" font-weight="700" fill="#1c1917">Zwei verschiedene Dinge: Inhalt und Metadaten</text>

  <!-- plot -->
  <rect x="120" y="70" width="620" height="380" fill="#fafaf9" stroke="#e7e5e4"/>
  <line x1="430" y1="70" x2="430" y2="450" stroke="#e7e5e4" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="120" y1="260" x2="740" y2="260" stroke="#e7e5e4" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- axis labels -->
  <text x="430" y="482" text-anchor="middle" font-size="14" font-weight="600" fill="#57534e">Inhalt geschützt (E2E im Standard)  →</text>
  <text x="132" y="60" font-size="14" font-weight="600" fill="#57534e">↑ Metadaten geschützt / datensparsam</text>
  <text x="128" y="442" font-size="11" fill="#a8a29e">Server liest mit</text>
  <text x="712" y="442" text-anchor="end" font-size="11" fill="#a8a29e">nur ihr beide</text>

  <!-- ===== top-right: both protected (most private) ===== -->
  <g fill="#16a34a">
    <circle cx="690" cy="115" r="9"/><circle cx="640" cy="150" r="9"/><circle cx="700" cy="185" r="9"/>
  </g>
  <text x="678" y="112" text-anchor="end" font-size="13" font-weight="700" fill="#15803d">SimpleX</text>
  <text x="628" y="147" text-anchor="end" font-size="13" font-weight="700" fill="#15803d">Threema</text>
  <text x="688" y="189" text-anchor="end" font-size="13" font-weight="700" fill="#15803d">Signal</text>
  <text x="625" y="230" text-anchor="middle" font-size="11" fill="#16a34a">Inhalt + Metadaten geschützt</text>
  <!-- Matrix a bit lower (metadata partial) -->
  <circle cx="640" cy="300" r="8" fill="#0d9488"/>
  <text x="628" y="304" text-anchor="end" font-size="12" font-weight="600" fill="#0f766e">Matrix</text>

  <!-- ===== bottom-right: content yes, metadata no ===== -->
  <g fill="#eab308">
    <circle cx="690" cy="390" r="9"/><circle cx="600" cy="365" r="9"/>
  </g>
  <text x="678" y="394" text-anchor="end" font-size="13" font-weight="700" fill="#a16207">WhatsApp</text>
  <text x="588" y="369" text-anchor="end" font-size="13" font-weight="700" fill="#a16207">iMessage</text>
  <text x="640" y="425" text-anchor="middle" font-size="11" fill="#a16207">Inhalt E2E, aber viele Metadaten</text>

  <!-- ===== top-left: content no, metadata okay ===== -->
  <circle cx="255" cy="180" r="9" fill="#ea580c"/>
  <text x="270" y="184" font-size="13" font-weight="700" fill="#c2410c">Telegram</text>
  <text x="255" y="215" text-anchor="middle" font-size="11" fill="#c2410c">Inhalt lesbar (kein E2E),</text>
  <text x="255" y="229" text-anchor="middle" font-size="11" fill="#c2410c">aber weniger Metadaten</text>

  <!-- ===== bottom-left: X Chat, unverifiable ===== -->
  <circle cx="300" cy="400" r="9" fill="#78716c"/>
  <text x="315" y="396" font-size="13" font-weight="700" fill="#57534e">X Chat</text>
  <text x="315" y="412" font-size="11" fill="#78716c">E2E beansprucht,</text>
  <text x="315" y="426" font-size="11" fill="#78716c">nicht überprüfbar (?)</text>

  <text x="410" y="512" text-anchor="middle" font-size="12.5" fill="#57534e">WhatsApp und Telegram scheitern an unterschiedlichen Achsen — nicht „der eine ist privater".</text>
</svg>
