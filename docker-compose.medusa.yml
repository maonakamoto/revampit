version: '3.8'

services:
  # PostgreSQL for Medusa
  medusa_db:
    container_name: revampit_medusa_db
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${MEDUSA_DB_USER:-medusa}
      POSTGRES_PASSWORD: ${MEDUSA_DB_PASSWORD:-medusa_password}
      POSTGRES_DB: ${MEDUSA_DB_NAME:-medusa_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    volumes:
      - medusa_db_data:/var/lib/postgresql/data
    ports:
      - "${MEDUSA_DB_PORT:-5435}:5432"
    networks:
      - medusa_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${MEDUSA_DB_USER:-medusa}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis/Valkey for Medusa
  medusa_redis:
    container_name: revampit_medusa_redis
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${MEDUSA_REDIS_PORT:-6380}:6379"
    networks:
      - medusa_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Meilisearch for fast product search
  meilisearch:
    container_name: revampit_meilisearch
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey_change_in_production}
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "${MEILI_PORT:-7700}:7700"
    networks:
      - medusa_net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Medusa backend (runs from medusa-backend directory)
  medusa:
    container_name: revampit_medusa
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./medusa-backend:/app
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://medusa:medusa_password@medusa_db:5432/medusa_db
      REDIS_URL: redis://medusa_redis:6379
      STORE_CORS: http://localhost:3000,http://localhost:3001
      ADMIN_CORS: http://localhost:9000,http://localhost:7001
      AUTH_CORS: http://localhost:9000,http://localhost:3000
      JWT_SECRET: ${JWT_SECRET:-supersecret_change_in_production}
      COOKIE_SECRET: ${COOKIE_SECRET:-supersecret_change_in_production}
      MEILI_HOST: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-masterKey_change_in_production}
    command: sh -c "npm ci && npx medusa migrations run && npx medusa develop"
    ports:
      - "9000:9000"
    depends_on:
      medusa_db:
        condition: service_healthy
      medusa_redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    networks:
      - medusa_net

volumes:
  medusa_db_data:
    driver: local
  meilisearch_data:
    driver: local

networks:
  medusa_net:
    driver: bridge
