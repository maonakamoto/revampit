name: Deploy Medusa

on:
  workflow_dispatch:

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  skip:
    name: Skip deploy (missing FLY_API_TOKEN)
    runs-on: ubuntu-latest
    if: ${{ secrets.FLY_API_TOKEN == '' }}
    steps:
      - name: Skip reason
        run: echo "FLY_API_TOKEN is not configured; skipping Medusa deployment."

  deploy:
    name: Deploy Medusa to Fly.io
    runs-on: ubuntu-latest
    if: ${{ secrets.FLY_API_TOKEN != '' }}
    defaults:
      run:
        working-directory: medusa-backend
    steps:
      - uses: actions/checkout@v6

      - name: Setup Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
