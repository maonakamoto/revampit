name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  # Quality checks - runs on all branches and PRs
  # Self-host deploy: .github/workflows/deploy-selfhost.yml on push to main
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build verification
        run: npm run build
        env:
          NEXT_PUBLIC_VERCEL_ENV: preview
          # Build-time placeholders so strict env validation doesn't fail during CI compile.
          AUTH_SECRET: ci-build-placeholder-secret-32chars
          DB_HOST: localhost
          DB_NAME: revampit_ci
          DB_USER: ci
          DB_PASSWORD: ci

  # Auth smoke gate: verifies login flow end-to-end when secrets are present
  auth-smoke:
    name: Auth Smoke Test
    runs-on: ubuntu-latest
    needs: quality
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run auth smoke (if auth test secrets configured)
        env:
          AUTH_TEST_EMAIL: ${{ secrets.AUTH_TEST_EMAIL }}
          AUTH_TEST_PASSWORD: ${{ secrets.AUTH_TEST_PASSWORD }}
        run: |
          if [ -z "$AUTH_TEST_EMAIL" ] || [ -z "$AUTH_TEST_PASSWORD" ]; then
            echo "AUTH_TEST_EMAIL/AUTH_TEST_PASSWORD not set in repo secrets; skipping auth smoke."
            exit 0
          fi
          PLAYWRIGHT_BASE_URL="${PLAYWRIGHT_BASE_URL:-https://revampit.orangecat.ch}" \
            npx playwright test tests/e2e/auth-smoke.spec.ts --project=chromium --reporter=line

  # Prod health gate: full dual-persona route inventory (186 routes) when passwords set.
  # Primary gate is post-deploy in deploy-selfhost.yml; this catches prod regressions on PRs too.
  inventory-smoke:
    name: Dual-Persona Inventory Smoke
    runs-on: ubuntu-latest
    needs: quality
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run inventory smoke (if dual-persona secrets configured)
        env:
          AUTH_TEST_USER_PASSWORD: ${{ secrets.AUTH_TEST_USER_PASSWORD }}
          AUTH_TEST_ADMIN_PASSWORD: ${{ secrets.AUTH_TEST_ADMIN_PASSWORD }}
          AUTH_TEST_USER_EMAIL: ${{ secrets.AUTH_TEST_USER_EMAIL }}
          AUTH_TEST_ADMIN_EMAIL: ${{ secrets.AUTH_TEST_ADMIN_EMAIL }}
        run: bash scripts/e2e-inventory-prod.sh

  # Migration drift check — applies every SQL migration in scripts/db/migrations/
  # to a throwaway Postgres container in order, asserts no errors, and reports the
  # final table count. Catches non-idempotent migrations, broken sequences, and
  # accidental order-dependence before they hit production. Non-blocking advisory:
  # `continue-on-error: true` so a CI hiccup doesn't block merges — but the run
  # surfaces immediately in the Actions UI.
  #
  # Why this exists: schema_migrations tracking is bootstrapped (migration 083) but
  # we still have no automated apply step against prod. Drift between merged-but-unapplied
  # migrations and the live DB grows invisibly without this gate.
  migrations:
    name: Migration Drift Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: revampit_drift
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Apply migrations in order
        env:
          PGHOST: localhost
          PGPORT: 5432
          PGUSER: postgres
          PGPASSWORD: ci
          PGDATABASE: revampit_drift
        run: |
          set -e
          # gen_random_uuid() is native from PG 13+; pgcrypto guarantees it for
          # any older bases or migrations that explicitly require the extension.
          psql -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;" || true
          count=0
          for f in $(ls scripts/db/migrations/*.sql | sort -V); do
            count=$((count + 1))
            echo "→ $(basename "$f")"
            psql -v ON_ERROR_STOP=1 -1 -f "$f" >/dev/null
          done
          echo ""
          echo "✓ Applied $count migrations cleanly"
          echo ""
          echo "Final table count:"
          psql -tA -c "SELECT COUNT(*) FROM pg_tables WHERE schemaname='public'"
          echo ""
          echo "Tracking table state:"
          psql -tA -c "SELECT COUNT(*) || ' rows in schema_migrations' FROM schema_migrations"

  # Unit tests (still non-blocking while suite matures)
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
        continue-on-error: true
