name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'

jobs:
  # Quality checks - runs on all branches and PRs
  # Note: Vercel automatically deploys when code is merged to main branch
  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build verification
        run: npm run build
        env:
          NEXT_PUBLIC_VERCEL_ENV: preview

  # Auth smoke gate: verifies login flow end-to-end when secrets are present
  auth-smoke:
    name: Auth Smoke Test
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run auth smoke (if auth test secrets configured)
        env:
          AUTH_TEST_EMAIL: ${{ secrets.AUTH_TEST_EMAIL }}
          AUTH_TEST_PASSWORD: ${{ secrets.AUTH_TEST_PASSWORD }}
        run: |
          if [ -z "$AUTH_TEST_EMAIL" ] || [ -z "$AUTH_TEST_PASSWORD" ]; then
            echo "AUTH_TEST_EMAIL/AUTH_TEST_PASSWORD not set in repo secrets; skipping auth smoke."
            exit 0
          fi
          npx playwright test tests/e2e/auth-smoke.spec.ts --project=chromium

  # Unit tests (still non-blocking while suite matures)
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test
        continue-on-error: true
