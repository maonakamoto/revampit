version: '3.8'

services:
  reboot-content:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: revampit-reboot-content
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - "${PORT:-3001}:3001"
    networks:
      - revampit_network
    depends_on:
      - reboot-db
    volumes:
      - ./uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  reboot-db:
    image: postgres:15-alpine
    container_name: revampit-reboot-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-revampit_cms}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - revampit_network
    volumes:
      - reboot_db_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  reboot_db_data:
    driver: local

networks:
  revampit_network:
    external: true
    name: revampit_revampit_network

