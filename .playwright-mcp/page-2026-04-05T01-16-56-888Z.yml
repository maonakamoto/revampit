              - heading "Hardware-Recycling" [level=3] [ref=e92]
              - paragraph [ref=e93]: Wir reparieren und überholen IT-Geräte jeden Alters und schenken ihnen ein zweites Leben. Von alten MacBooks bis zu Vintage-Computern – jedes Gerät verdient eine zweite Chance.
            - generic [ref=e94]:
              - img [ref=e96]
              - heading "Open Source-Software" [level=3] [ref=e99]
              - paragraph [ref=e100]: Wir setzen auf Linux und andere Open Source-Lösungen. Diese Technologien halten ältere Geräte effizient am Laufen und bieten Sicherheit durch Kontrolle über das eigene System.
            - generic [ref=e101]:
