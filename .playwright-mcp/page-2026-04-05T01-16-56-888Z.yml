              - heading "Gemeinschaft & Soziales" [level=3] [ref=e108]
              - paragraph [ref=e109]: Wir schaffen sinnvolle Arbeitsplätze für Menschen, die es auf dem regulären Arbeitsmarkt schwer haben. Mit unserem Tauschsystem kann man Dienstleistungen gegen Technik tauschen.
