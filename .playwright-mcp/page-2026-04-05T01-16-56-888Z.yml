              - text: Unsere Geschichte
            - heading "Die Gründung von Revamp-IT" [level=2] [ref=e160]
            - paragraph [ref=e161]: Vom Käsekeller zur Bewegung
          - generic [ref=e164]:
            - paragraph [ref=e165]: "Revamp-IT wurde im Dezember 2003 in Zürich gegründet – geboren aus einer einfachen Beobachtung: Immer mehr brauchbare Computer landeten im Müll. \"Da muss etwas passieren\", war der Gedanke, der alles ins Rollen brachte."
            - paragraph [ref=e166]: "Der erste Standort war ein alter Käsekeller in der Toni Molkerei. Dort entstand die Idee, die bis heute trägt: Hardware-Recycling und Linux kombinieren. Denn mit Open-Source-Software funktionieren auch ältere Geräte noch jahrelang."
            - paragraph [ref=e167]: "Was als kleines Projekt begann, wurde zur Bewegung. Ohne gross nach Leuten zu suchen, kamen immer wieder Menschen dazu, die sagten: \"Toll, was ihr da macht.\" Heute, über 20 Jahre später, verarbeiten wir jährlich rund 1000 Geräte – davon werden etwa 150 aufbereitet und verkauft, der Rest geht in Ersatzteilgewinnung und fachgerechtes Recycling."
          - generic [ref=e168]:
            - heading "Meilensteine" [level=3] [ref=e169]
            - paragraph [ref=e170]: Von der kleinen Werkstatt zur führenden Organisation für nachhaltige IT in der Schweiz.
