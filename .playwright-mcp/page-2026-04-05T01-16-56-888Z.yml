                - paragraph [ref=e73]: "\"10 Jahre sind das Minimum für ein Velo – und für einen Laptop auch!\""
              - paragraph [ref=e74]:
                - text: "Als gemeinnütziger Verein verändern wir seit 2003 den Umgang mit Technik. Unsere Mission ist klar:"
                - strong [ref=e75]: Die Lebensdauer von IT-Geräten verlängern
                - text: und Elektroschrott durch Reparatur, Wiederaufbereitung und nachhaltige Praktiken reduzieren.
              - paragraph [ref=e76]: In unseren Räumlichkeiten – einer ehemaligen Bank – haben wir einen Treffpunkt geschaffen, wo Technik und Nachhaltigkeit zusammenkommen. Unser Ansatz verbindet Hardware-Recycling mit Open Source-Software und schafft so nachhaltige IT-Lösungen für Mensch und Umwelt.
        - generic [ref=e78]:
